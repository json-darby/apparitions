<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apparitions: Conjure up fluency</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@200,300,400,500,600,700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              display: ['Clash Display', 'sans-serif'],
              body: ['Inter', 'sans-serif'],
            },
            colors: {
              editorial: {
                bg: '#050505',
                footer: '#0a0a0a',
                muted: 'rgba(255, 255, 255, 0.4)',
                border: 'rgba(255, 255, 255, 0.05)',
              }
            }
          }
        }
      }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: #d1d1d1;
            margin: 0;
            overflow-x: hidden;
        }
        .mono {
            font-family: 'JetBrains+Mono', monospace;
        }
        /* Noise overlay for brutalist texture */
        .noise::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.05;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            z-index: 50;
        }
        .vignette {
            box-shadow: inset 0 0 200px rgba(0,0,0,0.9);
        }
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        ::-webkit-scrollbar-thumb {
            background: #222;
        }
        @keyframes fadeOut {
            from { opacity: 1; filter: blur(0); }
            to { opacity: 0; filter: blur(4px); }
        }
        @keyframes slideInRight {
            from { transform: translateX(50px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
